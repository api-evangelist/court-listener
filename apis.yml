aid: court-listener
name: CourtListener
description: >
  CourtListener is a free legal research platform operated by the Free Law Project,
  a nonprofit organization. It provides a comprehensive REST API for accessing US court
  opinions, dockets, oral arguments, judge biographical data, financial disclosures, and
  citation networks from federal and state courts. The platform archives over 9 million
  case law decisions, 500 million PACER-related items, 3.4 million minutes of oral arguments,
  and data on 16,000+ judges. Access is available through a membership model with rate limits
  scaling by tier; an EDU tier is free for academic users.
