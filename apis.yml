apis:
  - aid: court-listener:court-listener-rest-api
    name: CourtListener REST API
    description: >
      REST API v4.4 providing programmatic access to US court opinions, PACER docket data,
      judge records, financial disclosures, oral argument audio, citation lookup and network
      analysis, search alerts, and case visualizations. Supports Token, Cookie/Session, and
      HTTP Basic authentication. Returns JSON, HTML, or XML.
